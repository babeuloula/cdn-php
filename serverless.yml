service: cdn-php

params:
    default:
        storage_driver: s3
        cache_ttl: 31536000
        avif_enabled: 'true'
        webp_enabled: 'true'

    prod:
        app_debug: 0
        log_level: info
        allowed_domains: ${ssm:/cdn-php/prod/allowed-domains}
        domains_aliases: ${ssm:/cdn-php/prod/domains-aliases}
        s3_bucket: ${ssm:/cdn-php/prod/s3-bucket}
        s3_endpoint: ${ssm:/cdn-php/prod/s3-endpoint}
        s3_region: ${ssm:/cdn-php/prod/s3-region}
        s3_access_key: ${ssm:/cdn-php/prod/s3-access-key}
        s3_secret_key: ${ssm:/cdn-php/prod/s3-secret-key}
        avif_enabled: ${ssm:/cdn-php/prod/avif-enabled}
        webp_enabled: ${ssm:/cdn-php/prod/webp-enabled}
        jpeg_compression: ${ssm:/cdn-php/prod/jpeg-compression}
        webp_compression: ${ssm:/cdn-php/prod/webp-compression}
        avif_compression: ${ssm:/cdn-php/prod/avif-compression}
        force_token: ${ssm:/cdn-php/prod/force-token}

    dev:
        app_debug: 1
        log_level: debug
        allowed_domains: ${ssm:/cdn-php/dev/allowed-domains}
        domains_aliases: ${ssm:/cdn-php/dev/domains-aliases}
        s3_bucket: ${ssm:/cdn-php/dev/s3-bucket}
        s3_endpoint: ${ssm:/cdn-php/dev/s3-endpoint}
        s3_region: ${ssm:/cdn-php/dev/s3-region}
        s3_access_key: ${ssm:/cdn-php/dev/s3-access-key}
        s3_secret_key: ${ssm:/cdn-php/dev/s3-secret-key}
        avif_enabled: ${ssm:/cdn-php/dev/avif-enabled}
        webp_enabled: ${ssm:/cdn-php/dev/webp-enabled}
        jpeg_compression: ${ssm:/cdn-php/dev/jpeg-compression}
        webp_compression: ${ssm:/cdn-php/dev/webp-compression}
        avif_compression: ${ssm:/cdn-php/dev/avif-compression}
        force_token: ${ssm:/cdn-php/dev/force-token}

provider:
    name: aws
    region: eu-west-3
    apiGateway:
        binaryMediaTypes:
            - '*/*'
        minimumCompressionSize: 1024 # GZIP responses larger than 1 KB
    environment:
        BREF_BINARY_RESPONSES: '1'

plugins:
    - ./vendor/bref/bref
    - ./vendor/bref/extra-php-extensions

functions:
    main:
        handler: public/index.php
        description: 'CDN PHP'
        runtime: php-84-fpm
        layers:
            - ${bref-extra:imagick-php-84}
        timeout: 28 # in seconds (API Gateway has a timeout of 29 seconds)
        memorySize: 2048
        events:
            - http: 'GET /'
            - http: 'GET /{proxy+}'
            - schedule:
                rate: rate(5 minutes)
                input:
                    warmer: true
        environment:
            FETCH_TIMEOUT: 10
            FETCH_MAX_SIZE: 52428800
            FORCE_TOKEN: ${param:force_token}
            FETCH_ALLOW_REDIRECTS: 0
            APP_DEBUG: ${param:app_debug}
            CACHE_TTL: ${param:cache_ttl}
            STORAGE_DRIVER: ${param:storage_driver}
            S3_PATH_STYLE_ENDPOINT: 1
            ALLOWED_DOMAINS: ${param:allowed_domains}
            DOMAINS_ALIASES: ${param:domains_aliases}
            S3_BUCKET: ${param:s3_bucket}
            S3_ENDPOINT: ${param:s3_endpoint}
            S3_REGION: ${param:s3_region}
            S3_ACCESS_KEY: ${param:s3_access_key}
            S3_SECRET_KEY: ${param:s3_secret_key}
            LOG_STREAM: php://stderr
            LOG_LEVEL: ${param:log_level}
            AVIF_COMPRESSION: ${param:avif_compression}
            AVIF_ENABLED: ${param:avif_enabled}
            WEBP_ENABLED: ${param:webp_enabled}
            JPEG_COMPRESSION: ${param:jpeg_compression}
            WEBP_COMPRESSION: ${param:webp_compression}

package:
    patterns:
        - '!.cache/**'
        - '!.idea/**'
        - '!.github/**'
        - '!build/**'
        - '!docker/**'
        - '!tests/**'
        - '!.editorconfig'
        - '!.env.local'
        - '!.gitignore'
        - '!composer.json'
        - '!composer.lock'
        - '!LICENSE'
        - '!Makefile'
        - '!phpcs.xml'
        - '!phpmd-ruleset.xml'
        - '!phpstan.neon'
        - '!phpunit.xml'
        - '!CLAUDE.md'
        - '!README.md'
        - '!serverless.yml'
